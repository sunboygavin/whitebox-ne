#
# Huawei VRP-style CLI Aliases for FRR vtysh
#
# This file provides Huawei-style command aliases for FRR vtysh
# Configure this file to be sourced in vtysh
#

# ========== System View Commands ==========
alias system-view configure terminal

# ========== Save Commands ==========
alias save write

# ========== Display Commands ==========
alias display show

# ========== Interface Configuration ==========
alias interface interface

# ========== BGP Configuration ==========
alias bgp router bgp

# ========== OSPF Configuration ==========
alias ospf router ospf

# ========== MPLS Configuration ==========
alias mpls null

# ========== RIP Configuration ==========
alias rip router rip

# ========== IS-IS Configuration ==========
alias isis router isis

# ========== VRRP Configuration ==========
alias vrrp null

# ========== VLAN Configuration ==========
alias vlan null

# ========== ACL Configuration ==========
alias acl null

# ========== QoS Configuration ==========
alias qos null

# ========== System Configuration ==========
alias sysname hostname

# ========== Clock Configuration ==========
alias clock null

# ========== NTP Service Configuration ==========
alias ntp-service null

# ========== User Interface Configuration ==========
alias user-interface null

# ========== User VTY Configuration ==========
alias user-vty null

# ========== Timerange Configuration ==========
alias timerange null

# ========== Reset Commands ==========
alias reset null

# ========== End of Huawei VRP Aliases ==========
