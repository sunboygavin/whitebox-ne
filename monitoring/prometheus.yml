# Prometheus 配置文件
# 用于采集白盒网元的监控指标

global:
  scrape_interval: 15s        # 抓取间隔
  evaluation_interval: 15s     # 规则评估间隔
  external_labels:
    cluster: 'whitebox-ne'
    environment: 'production'

# 告警规则文件
rule_files:
  - "alerts.yml"

# 抓取配置
scrape_configs:
  # 白盒网元主路由器
  - job_name: 'whitebox-ne-router'
    static_configs:
      - targets: ['whitebox-ne:9090']
        labels:
          instance: 'router-1'
          role: 'core-router'
    scrape_interval: 10s
    metrics_path: '/metrics'

  # 白盒网元对等路由器 (如果有)
  - job_name: 'whitebox-ne-peer'
    static_configs:
      - targets: ['whitebox-ne-peer:9090']
        labels:
          instance: 'router-2'
          role: 'edge-router'
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 监控 Docker 主机指标 (使用 node_exporter)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

# 告警管理器配置 (可选)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# 远程写入配置 (可选)
# remote_write:
#   - url: http://remote-storage/api/v1/write
